<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",system-ui}
body{background:#f6f7f9;color:#222;max-width:1400px;margin:0 auto;padding:40px 16px}

/* 头部标题区域 */
.head-box{text-align:center;margin-bottom:60px}
.main-title{font-size:46px;font-weight:700;color:#0f0f0f;margin-bottom:12px}
.sub-small{font-size:16px;color:#666;margin-bottom:22px;letter-spacing:0.5px}
.desc-two{font-size:20px;color:#333;line-height:2;letter-spacing:1px}
.desc-two p{margin:8px 0}

/* 视频布局 */
.video-container{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-bottom:60px}
@media screen and (max-width:990px){
    .video-container{grid-template-columns:repeat(2,1fr)}
}
@media screen and (max-width:580px){
    .video-container{grid-template-columns:1fr}
}
.video-card{width:100%;background:#000;border-radius:12px;overflow:hidden}
.v-34{aspect-ratio:3/4}
.v-916{aspect-ratio:9/16}
video{width:100%;height:100%;object-fit:cover}

/* 分割线 */
.split{width:100%;height:1px;background:#d0d0d0;margin-bottom:50px}

/* 留言板样式 */
.msg-box{width:100%}
.msg-box h2{text-align:center;font-size:26px;margin-bottom:30px;color:#222}
.msg-form{background:#fff;padding:24px;border-radius:10px;box-shadow:0 1px 8px #eee;margin-bottom:35px}
.msg-form input,.msg-form textarea{width:100%;border:1px solid #ddd;padding:12px;border-radius:6px;font-size:15px;margin-bottom:16px}
.msg-form textarea{min-height:120px;resize:vertical}
.msg-form button{width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
.msg-form button:hover{background:#1d4ed8}

.msg-list{gap:18px;display:flex;flex-direction:column}
.msg-item{background:#fff;padding:18px;border-radius:10px;box-shadow:0 1px 6px #eee}
.msg-name{font-weight:bold;font-size:17px;margin-bottom:6px;color:#111}
.msg-time{font-size:13px;color:#888;margin-bottom:10px}
.msg-content{font-size:15px;color:#333;line-height:1.7}
</style>
</head>
<body>

<!-- 标题区域 -->
<div class="head-box">
    <h1 class="main-title">撤硕.com</h1>
    <div class="sub-small">我家住在葫芦岛</div>
    <div class="desc-two">
        <p>民以食为天，食以㞎为先</p>
        <p>用餐愉快，请勿暴饮暴食</p>
    </div>
</div>

<!-- 三个竖版视频 -->
<div class="video-container">
    <div class="video-card v-34">
        <video src="1.mp4" controls preload="metadata"></video>
    </div>
    <div class="video-card v-34">
        <video src="2.mp4" controls preload="metadata"></video>
    </div>
    <div class="video-card v-916">
        <video src="3.mp4" controls preload="metadata"></video>
    </div>
</div>

<div class="split"></div>

<!-- 完整留言板区域 -->
<div class="msg-box">
    <h2>留言互动区</h2>
    <form class="msg-form" id="msgForm">
        <input type="text" name="username" placeholder="请输入昵称" required>
        <textarea name="content" placeholder="写下你的留言内容..." required></textarea>
        <button type="submit">提交留言</button>
    </form>
    <div class="msg-list" id="msgList"></div>
</div>

<script>
// ====================== 改这里！填你虚拟主机 api.php 完整地址 ======================
const API_HOST = "//www.cbdjm.xyz/api.php";

// 加载留言
async function loadMsg(){
    try{
        const res = await fetch(API_HOST);
        const list = await res.json();
        const wrap = document.getElementById("msgList");
        wrap.innerHTML = "";
        list.forEach(item=>{
            wrap.innerHTML += `
                <div class="msg-item">
                    <div class="msg-name">${item.name}</div>
                    <div class="msg-time">${item.time}</div>
                    <div class="msg-content">${item.content}</div>
                </div>
            `;
        })
    }catch(err){
        document.getElementById("msgList").innerHTML = "<p style='text-align:center;color:red'>留言加载失败，请稍后重试</p>";
        console.error(err);
    }
}
loadMsg();

// 提交留言
document.getElementById("msgForm").addEventListener("submit",async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    try{
        await fetch(API_HOST,{method:"POST",body:fd});
        e.target.reset();
        loadMsg();
    }catch(err){
        alert("提交失败，接口访问异常");
        console.error(err);
    }
})
</script>

</body>
</html>
